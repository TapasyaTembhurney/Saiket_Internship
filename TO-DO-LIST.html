<!-- Task 5: Mini Project - To-Do List App

Create a to-do list application using HTML,
CSS, and JavaScript. Include features to
add, edit, delete, and mark tasks as
completed. Use CSS to style the app and
make it responsive for different screen
sizes.

Skills :

HTML
CSS
JavaScript -->

<!-- ---------------------------------------------------- -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.todo-app{
background:white;
width:100%;
max-width:500px;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

.input-box{
display:flex;
gap:10px;
flex-wrap:wrap;
}

input{
flex:1;
padding:10px;
font-size:16px;
}

button{
padding:10px 15px;
border:none;
cursor:pointer;
border-radius:5px;
}

.add-btn{
background:green;
color:white;
}

ul{
list-style:none;
margin-top:20px;
}

li{
background:#eee;
padding:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.completed{
text-decoration:line-through;
color:gray;
}

.task-buttons{
display:flex;
gap:8px;
margin-top:8px;
}

.complete-btn{
background:blue;
color:white;
}

.edit-btn{
background:orange;
color:white;
}

.delete-btn{
background:red;
color:white;
}

/* Responsive */
@media(max-width:600px){

.input-box{
flex-direction:column;
}

li{
flex-direction:column;
align-items:flex-start;
}

}

</style>
</head>

<body>

<div class="todo-app">

<h1>To-Do List</h1>

<div class="input-box">
<input type="text" id="taskInput" placeholder="Enter task">
<button class="add-btn" onclick="addTask()">Add Task</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

function addTask(){

let taskInput = document.getElementById("taskInput");
let taskText = taskInput.value.trim();

if(taskText === ""){
alert("Enter a task first");
return;
}

let li = document.createElement("li");

li.innerHTML = `
<span>${taskText}</span>

<div class="task-buttons">
<button class="complete-btn" onclick="completeTask(this)">
Complete
</button>

<button class="edit-btn" onclick="editTask(this)">
Edit
</button>

<button class="delete-btn" onclick="deleteTask(this)">
Delete
</button>
</div>
`;

document.getElementById("taskList").appendChild(li);

taskInput.value="";

}

function completeTask(button){

let task =
button.parentElement.parentElement.querySelector("span");

task.classList.toggle("completed");

}

function editTask(button){

let task =
button.parentElement.parentElement.querySelector("span");

let newTask =
prompt("Edit your task:", task.innerText);

if(newTask !== null && newTask.trim() !== ""){
task.innerText = newTask;
}

}

function deleteTask(button){

button.parentElement.parentElement.remove();

}

</script>

</body>
</html>
